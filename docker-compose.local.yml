# Local development override — run with:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
services:
  nginx:
    volumes:
      - ./default.local.conf.template:/etc/nginx/templates/default.conf.template:ro
      - socket-vol:/app/socket
      # No /etc/letsencrypt mount needed locally
    ports:
      - "80:80"
      # No 443 needed locally

  bitz-frontend:
    build:
      args:
        API_URL: http://localhost/api
