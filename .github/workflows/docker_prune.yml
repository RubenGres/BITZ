# Runs weekly to prevent disk from filling up with old Docker images/build cache.
# Can also be triggered manually from the Actions tab.
name: Docker Prune

on:
  schedule:
    - cron: '0 4 * * 0'  # Every Sunday at 4 AM UTC
  workflow_dispatch:

jobs:
  prune:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host key to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Prune Docker on VPS
        run: |
          ssh ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} '
            echo "=== Disk before ==="
            df -h /
            echo "=== Pruning ==="
            docker system prune -f
            echo "=== Disk after ==="
            df -h /
          '
